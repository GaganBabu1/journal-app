name: Java CI - Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Job 1: Backend Fitness Test
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('journalApp/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build & run tests
        working-directory: journalApp
        run: mvn -B -DskipTests=false test

  # Job 2: Frontend Fitness Test
  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: journalApp/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: journalApp/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  # Job 3: Deployment to AWS EC2 
  deploy:
    name: Deploy via SSH to EC2
    runs-on: ubuntu-latest
    needs: [build, frontend] 
    if: github.ref == 'refs/heads/main' 

    steps:
      - name: Execute remote deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          envs: MONGO_URI
          script: |
            cd ~/journal-app
            git pull origin main --ff-only
            export MONGO_URI=$MONGO_URI
            echo "MONGO_URI=$MONGO_URI" > .env
            docker compose up -d --build
            docker image prune -f
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
